---
# Source: app-a/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-a
  labels:
    app: app-a
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app-a
  template:
    metadata:
      labels:
        app: app-a
    spec:
      containers:
        - name: app-a
          image: "nginx:1.25"
          ports:
            - containerPort: 80
          env:
            - name: ENVIRONMENT
              value: "stage"
            - name: LOG_LEVEL
              value: "warn"
          resources:
            limits:
              cpu: 200m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi
