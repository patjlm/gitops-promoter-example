apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: app-d-integration

patches:
  - target:
      kind: CronJob
      name: app-d-batch
    patch: |
      - op: replace
        path: /spec/schedule
        value: "0 */4 * * *"
  - target:
      kind: ConfigMap
      name: app-d-config
    patch: |
      - op: replace
        path: /data/ENVIRONMENT
        value: "integration"
      - op: replace
        path: /data/BATCH_SIZE
        value: "50"
