apiVersion: batch/v1
kind: CronJob
metadata:
  labels:
    app: app-d
  name: app-d-batch
  namespace: app-d-integration
spec:
  jobTemplate:
    metadata:
      labels:
        app: app-d
    spec:
      template:
        metadata:
          labels:
            app: app-d
        spec:
          containers:
          - command:
            - /bin/sh
            - -c
            - echo Processing batch for $ENVIRONMENT at $(date) && sleep 10
            envFrom:
            - configMapRef:
                name: app-d-config
            image: busybox:1.36
            name: batch
            resources:
              limits:
                cpu: 500m
                memory: 256Mi
              requests:
                cpu: 100m
                memory: 64Mi
          restartPolicy: OnFailure
  schedule: 0 */4 * * *
